<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your IP Address and Location</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .info {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Your IP Address and Location</h1>
    <div class="info" id="ip-info">
        Loading your IP address and location...
    </div>

    <!-- Firebase SDK (ES Modules) -->
    <script type="module">
        // Import Firebase libraries
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js';
        import { getDatabase, ref, push } from 'https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAfl5jUGBZN6RA1b7STV1cHutjHr8OBdRs",
            authDomain: "radar-information.firebaseapp.com",
            databaseURL: "https://radar-information-default-rtdb.firebaseio.com",
            projectId: "radar-information",
            storageBucket: "radar-information.appspot.com",
            messagingSenderId: "187602607552",
            appId: "1:187602607552:web:7cd1cde6a035739ab03c25",
            measurementId: "G-KM7PF5F0YE"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Function to fetch IP and location data
        function fetchIPData() {
            return fetch('https://ipinfo.io/65921ede5909b9/json') // Using your provided token
                .then(response => response.json())
                .then(data => {
                    return data; // Return the fetched data
                })
                .catch(error => {
                    console.error('Error fetching IP info:', error);
                    throw new Error('Failed to fetch IP info.');
                });
        }

        // Function to display IP and location data on the webpage
        function displayData(data) {
            const ipInfoDiv = document.getElementById('ip-info');
            ipInfoDiv.innerHTML = `
                <p><strong>IP Address:</strong> ${data.ip}</p>
                <p><strong>Country:</strong> ${data.country}</p>
                <p><strong>Region:</strong> ${data.region}</p>
                <p><strong>City:</strong> ${data.city}</p>
                <p><strong>Timezone:</strong> ${data.timezone}</p>
                <p><strong>ISP:</strong> ${data.org}</p>
            `;
        }

        // Function to send data to Firebase Realtime Database
        function sendDataToFirebase(data) {
            const userIpInfoRef = ref(database, 'user-ip-info/');
            push(userIpInfoRef, {
                ipAddress: data.ip,
                country: data.country,
                region: data.region,
                city: data.city,
                timezone: data.timezone,
                isp: data.org,
                timestamp: new Date().toISOString()
            })
            .then(() => {
                console.log("Data sent to Firebase successfully.");
            })
            .catch(error => {
                console.error("Error sending data to Firebase:", error);
            });
        }

        // Main function to fetch, display, and send data
        function processIPData() {
            fetchIPData()
                .then(data => {
                    // Step 1: Display the data on the webpage
                    displayData(data);

                    // Step 2: Send the data to Firebase after it's displayed
                    sendDataToFirebase(data);
                })
                .catch(error => {
                    document.getElementById('ip-info').innerHTML = "Failed to load IP address and location.";
                    console.error("Error:", error);
                });
        }

        // Trigger the process when the webpage loads
        window.onload = processIPData;
    </script>
</body>
</html>
